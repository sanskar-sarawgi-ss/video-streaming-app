services:
  video-tube-backend-api-server-1:
    build: ./
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  video-tube-frontend:
    build:
      context: ./frontend/
    volumes:
      - ./frontend:/app
      - /app/node_modules

  load-balancer:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  redis-db:
    image: redis
    ports:
      - "6379:6379"